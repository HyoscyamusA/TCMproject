<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>中医知识图谱问答系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            height: 100vh;
            background-color: #f7f9fb;
        }
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #3498db;
        }
        .content {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
        }
        /* 新增顶栏样式 */
    .top-bar {
        display: flex;
        justify-content: flex-end; /* 内容靠右对齐 */
        align-items: center;       /* 垂直居中对齐 */
        margin-bottom: 20px;       /* 距离下方主体内容留出一点间距 */
        padding-bottom: 10px;
        border-bottom: 1px solid #e0e0e0; /* 可选：加一条淡淡的分割线 */
        gap: 15px;                 /* 用户名和退出按钮之间的间距 */
    }

    .user-info {
        font-size: 0.9em;
        color: #2c3e50; /* 因为背景变成浅色了，字体颜色要改成深色 */
    }
    </style>
</head>
<body>
    {% set current_page = active_page if active_page is defined else (mode if mode is defined else '') %}
<!--    <div class="sidebar">-->
<!--        <h4>🌿 中医问答系统</h4>-->
<!--        <a href="{{ url_for('home') }}" class="{% if current_page == 'home' %}active{% endif %}">🏠 首页</a>-->
<!--        <a href="{{ url_for('answer') }}" class="{% if current_page == 'answer' %}active{% endif %}">💬 问答模式</a>-->
<!--        <a href="{{ url_for('inference') }}" class="{% if current_page == 'inference' %}active{% endif %}">🧠 推理模式</a>-->
<!--        &lt;!&ndash; 在sidebar div中添加 &ndash;&gt;-->
<!--        <a href="{{ url_for('herb_search') }}" class="{% if current_page == 'herb' %}active{% endif %}">🌿 药材搜索</a>-->
<!--&lt;!&ndash;        <a href="{{ url_for('dashboard') }}" class="{% if current_page == 'dashboard' %}active{% endif %}">📊 数据大屏</a>&ndash;&gt;-->
<!--        <a href="{{ url_for('wordcloud') }}" class="{% if current_page == 'wordcloud' %}active{% endif %}">词云分析</a>-->
<!--        <a href="{{ url_for('history_page') }}" class="{% if current_page == 'history' %}active{% endif %}">📜 查询历史</a>-->
<!--    </div>-->
    <div class="sidebar">
        <h4>🌿 中医知识图谱</h4>
        <a href="{{ url_for('home') }}" class="{% if current_page == 'home' %}active{% endif %}">🏠 系统首页</a>
        <a href="{{ url_for('answer') }}" class="{% if current_page == 'answer' %}active{% endif %}">💬 症状辨证问答</a>
        <a href="{{ url_for('inference') }}" class="{% if current_page == 'inference' %}active{% endif %}">🧠 方剂查询对比</a>
        <a href="{{ url_for('herb_search') }}" class="{% if current_page == 'herb' or current_page == 'herb_search' %}active{% endif %}">🌿 药材反向寻方</a>
        <a href="{{ url_for('wordcloud') }}" class="{% if current_page == 'wordcloud' %}active{% endif %}">☁️ 功效词云分析</a>
        <a href="{{ url_for('ai_chat') }}" class="{% if current_page == 'ai_chat' %}active{% endif %}">🤖 AI 智能问答</a>
        <a href="{{ url_for('graph_overview')}}" class="{% if current_page == 'graph_overview' %}active{% endif %}">🌌 图谱全景总览</a>
        <a href="{{ url_for('dashboard') }}" class="{% if current_page == 'dashboard' %}active{% endif %}">📊 数据统计看板</a>
        <a href="{{ url_for('history_page') }}" class="{% if current_page == 'history' %}active{% endif %}">📜 检索历史记录</a>


    </div>



    <div class="content">
        <div class="top-bar">
        <div class="user-info">
            当前用户: <strong>{{ session.get('username', '未知用户') }}</strong>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">🚪 退出账号</a>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
