{% extends "layout.html" %}
{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="height: 80vh;">
    <div class="card shadow border-0" style="width: 400px; border-radius: 12px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="text-success fw-bold">新用户注册</h3>
                <p class="text-muted small">创建您的专属中医知识档案</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2 text-center" role="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label text-muted">设置用户名</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required placeholder="例如：admin123">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">设置密码</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required placeholder="建议至少6位">
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 mb-3" style="border-radius: 8px;">注 册 账 号</button>
            </form>
            <div class="text-center">
                <span class="text-muted small">已有账号？ </span>
                <a href="{{ url_for('login') }}" class="text-decoration-none text-success">直接登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
