<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 中医知识图谱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 浅灰色背景，让登录卡片更突出 */
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; margin: 0;">

    <div class="card shadow border-0" style="width: 400px; border-radius: 12px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="text-primary fw-bold">系统登录</h3>
                <p class="text-muted small">欢迎回到中医知识图谱系统</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2 text-center" role="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label text-muted">用户名</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required placeholder="请输入账号">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">密码</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" style="border-radius: 8px;">立 即 登 录</button>
            </form>
            <div class="text-center">
                <span class="text-muted small">还没有账号？ </span>
                <a href="{{ url_for('register') }}" class="text-decoration-none">点击注册</a>
            </div>
        </div>
    </div>

</body>
</html>
