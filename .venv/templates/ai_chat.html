{% extends "layout.html" %}
{% block content %}
<style>
    /* 聊天主容器：自适应剩余空间 */
    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 130px); /* 动态计算高度，减去顶部导航 */
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        overflow: hidden;
        margin: 0 auto;
        max-width: 1100px; /* 限制最大宽度，防止在大屏上太散 */
    }

    /* 消息展示区 */
    .chat-box {
        flex-grow: 1;
        padding: 25px;
        overflow-y: auto;
        background-color: #fcfdfe;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .message {
        display: flex;
        flex-direction: column;
        max-width: 85%;
    }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai { align-self: flex-start; align-items: flex-start; }

    /* 气泡样式优化 */
    .msg-bubble {
        padding: 14px 20px;
        border-radius: 18px;
        font-size: 15.5px;
        line-height: 1.7;
        word-wrap: break-word;
        position: relative;
    }

    /* 用户气泡：蓝色 */
    .message.user .msg-bubble {
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
        border-bottom-right-radius: 4px;
    }

    /* AI气泡：白色+边框 */
    .message.ai .msg-bubble {
        background-color: #ffffff;
        border: 1px solid #eef2f5;
        color: #2c3e50;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    /* 让 AI 回复里的 Markdown 更好看 */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { font-size: 1.2rem; margin-top: 10px; color: #2c3e50; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 0; }
    .msg-bubble p { margin-bottom: 8px; }

    /* 输入区域固定在底部 */
    .input-group-area {
        padding: 20px;
        background: #fff;
        border-top: 1px solid #f0f2f5;
    }

    #user-input {
        border-radius: 25px;
        padding: 12px 20px;
        border: 2px solid #edf0f2;
        transition: border-color 0.3s;
    }
    #user-input:focus {
        border-color: #3498db;
        box-shadow: none;
    }

    /* 等待动画 */
    #typing {
        font-style: italic;
        color: #95a5a6;
        font-size: 0.9rem;
        margin-bottom: 10px;
        display: none;
    }
</style>

<div class="chat-container">
    <div class="chat-box" id="chat-box">
        <div class="message ai">
            <div class="msg-bubble">
                你好！我是您的中医AI助手。您可以向我咨询方剂、药材或病症，我会结合知识图谱为您详细解答。
            </div>
        </div>

        {% for chat in chat_history %}
        <div class="message user">
            <div class="msg-bubble">{{ chat.question }}</div>
        </div>
        <div class="message ai">
            <div class="msg-bubble">{{ chat.answer | safe }}</div>
        </div>
        {% endfor %}
    </div>

    <div id="typing" class="px-4">AI 正在思考并查阅医书...</div>

    <div class="input-group-area">
        <div class="input-group">
            <input type="text" id="user-input" class="form-control" placeholder="请输入您的问题（例如：麻黄汤的组成和主治是什么？）" onkeypress="handleEnter(event)">
            <button class="btn btn-primary px-4 ms-2" style="border-radius: 25px;" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const inputField = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing');

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }
    window.onload = scrollToBottom;

    function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

    function sendMessage() {
        const text = inputField.value.trim();
        if(!text) return;

        // 1. 添加用户消息
        inputField.value = '';
        chatBox.insertAdjacentHTML('beforeend', `<div class=\"message user\"><div class=\"msg-bubble\">${text}</div></div>`);
        scrollToBottom();

        // 2. 显示等待
        typingIndicator.style.display = 'block';

        // 3. 后端请求
        fetch("{{ url_for('ai_chat') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text })
        })
        .then(response => response.json())
        .then(data => {
            typingIndicator.style.display = 'none';
            chatBox.insertAdjacentHTML('beforeend', `<div class=\"message ai\"><div class=\"msg-bubble\">${data.reply}</div></div>`);
            scrollToBottom();
        })
        .catch(err => {
            typingIndicator.style.display = 'none';
            alert("本地AI连接失败，请确保Ollama已开启并下载了qwen2.5:7b");
        });
    }
</script>
{% endblock %}
