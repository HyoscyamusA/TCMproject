<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>中医知识图谱问答系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
   <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 70px;
            --primary-dark: #2c3e50;
            --accent-color: #3498db;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f7f9fb;
            overflow: hidden;
        }

        /* 侧边栏基础样式 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-dark);
            color: #ecf0f1;
            transition: all 0.3s ease; /* 添加平滑过渡效果 */
            display: flex;
            flex-direction: column;
            white-space: nowrap; /* 防止文字折行 */
            overflow-x: hidden;
            z-index: 1000;
        }

        /* 侧边栏折叠状态 (可以手动通过 JS 切换，或设为默认) */
        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar h4 {
            padding: 20px;
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #3e4f5f;
            margin-bottom: 10px;
        }

        /* 导航链接样式 */
        .sidebar a {
            display: flex;
            align-items: center;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 22px;
            margin: 4px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .sidebar a i, .sidebar a span.icon {
            margin-right: 15px;
            min-width: 25px;
            text-align: center;
            font-size: 1.2rem;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* 内容区域 */
        .content {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* 延伸按钮样式 */
        #toggle-btn {
            cursor: pointer;
            padding: 5px 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 15px;
        }
    </style>
</head>
<body>
   {% set current_page = active_page if active_page is defined else '' %}
    <div class="sidebar" id="sidebar">
        <h4><span id="sidebar-title">🌿 中医知识图谱</span></h4>
        <a href="{{ url_for('home') }}" class="{% if current_page == 'home' %}active{% endif %}">🏠 系统首页</a>
        <a href="{{ url_for('answer') }}" class="{% if current_page == 'answer' %}active{% endif %}">💬 症状辨证问答</a>
        <a href="{{ url_for('inference') }}" class="{% if current_page == 'inference' %}active{% endif %}">🧠 方剂查询对比</a>
        <a href="{{ url_for('herb_search') }}" class="{% if current_page == 'herb' or current_page == 'herb_search' %}active{% endif %}">🌿 药材反向寻方</a>

        <a href="{{ url_for('department_search') }}" class="{% if current_page == 'department_search' %}active{% endif %}">🏥 科室关联查询</a>
        <a href="{{ url_for('wordcloud') }}" class="{% if current_page == 'wordcloud' %}active{% endif %}">☁️ 功效词云分析</a>
        <a href="{{ url_for('ai_chat') }}" class="{% if current_page == 'ai_chat' %}active{% endif %}">🤖 AI 智能问答</a>
        <a href="{{ url_for('graph_overview')}}" class="{% if current_page == 'graph_overview' or current_page == 'overview' %}active{% endif %}">🌌 图谱全景总览</a>
        <a href="{{ url_for('dashboard') }}" class="{% if current_page == 'dashboard' %}active{% endif %}">📊 数据统计看板</a>
        <a href="{{ url_for('history_page') }}" class="{% if current_page == 'history' %}active{% endif %}">📜 检索历史记录</a>
        <a href="{{ url_for('profile') }}" class="{% if current_page == 'profile' %}active{% endif %}">👤 个人空间</a>
    </div>



    <div class="content">
        <div class="top-bar">
          <div>
                <button id="toggle-btn">☰</button>
          </div>
        <div class="user-info">
            当前用户: <strong>{{ session.get('username', '未知用户') }}</strong>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">🚪 退出账号</a>
        </div>
        {% block content %}{% endblock %}
    </div>

  <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');
        const sidebarTitle = document.getElementById('sidebar-title');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            if(sidebar.classList.contains('collapsed')) {
                sidebarTitle.innerText = "🌿";
            } else {
                sidebarTitle.innerText = "🌿 中医图谱";
            }
        });
    </script>

</body>
</html>
