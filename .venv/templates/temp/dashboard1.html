{% extends "layout.html" %}

{% block content %}
<!-- 数据大屏标题 -->
<div style="text-align: center; margin-bottom: 30px;">
  <h1 style="color: #333; font-size: 28px;">中医知识图谱数据大屏</h1>
  <p style="color: #666; font-size: 16px;">统计核心数据</p>
</div>

<!-- 数据卡片区域（4个核心指标） -->
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
  <!-- 中药总数 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">中药总数</p>
    <p style="color: #333; font-size: 32px; font-weight: bold; margin: 0;">{{ total_herbs }}</p>
  </div>
  <!-- 方剂总数 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">处方总数</p>
    <p style="color: #333; font-size: 32px; font-weight: bold; margin: 0;">{{ total_prescriptions }}</p>
  </div>
  <!-- 症状（功能主治）总数 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">症状总数</p>
    <p style="color: #333; font-size: 32px; font-weight: bold; margin: 0;">{{ total_symptoms }}</p>
  </div>
  <!-- 关联关系总数 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">关联关系总数</p>
    <p style="color: #333; font-size: 32px; font-weight: bold; margin: 0;">{{ total_relations }}</p>
  </div>
</div>

<!-- 图表区域（2个核心可视化） -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
  <!-- 药材类别分布饼图 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h3 style="color: #333; font-size: 18px; margin-bottom: 15px;">药材类别分布</h3>
    <div id="categoryChart" style="width: 100%; height: 400px;"></div>
  </div>
  <!-- 高频中药TOP10柱状图 -->
  <div style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h3 style="color: #333; font-size: 18px; margin-bottom: 15px;">高频中药使用TOP10</h3>
    <div id="topHerbsChart" style="width: 100%; height: 400px;"></div>
  </div>
</div>

<!-- dashboard.html 中图表部分完整代码 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. 药材类别分布饼图
  // 1. 处理数据：合并数量极少的类别为“其他”（避免扇区细碎）
  const rawData = {{ category_data|tojson }};
  const minThreshold = 5; // 数量小于5的类别合并为“其他”
  let otherCount = 0;
  const processedData = rawData.filter(item => {
    if (item.value < minThreshold) {
      otherCount += item.value;
      return false;
    }
    return true;
  });
  // 如果有合并的“其他”，添加到数据中
  if (otherCount > 0) {
    processedData.push({ name: '其他', value: otherCount });
  }

  // 2. 生成多样化颜色（避免重复，支持更多类别）
  function generateColors(count) {
    const colors = [];
    for (let i = 0; i < count; i++) {
      // 使用HSV颜色空间，色调均匀分布（0-360），饱和度和明度固定
      const hue = (i * 360 / count) % 360;
      colors.push(`hsla(${hue}, 70%, 60%, 0.8)`);
    }
    return colors;
  }
  const colors = generateColors(processedData.length);

  // 3. 初始化饼图
  const categoryChart = echarts.init(document.getElementById('categoryChart'));
  categoryChart.setOption({
    tooltip: {
      trigger: 'item',
      formatter: '{b}: {c} ({d}%)'  // 显示名称、数量、占比
    },
    legend: {
      orient: 'horizontal',  // 水平布局
      top: 'bottom',         // 图例放在底部（避免与图表重叠）
      left: 'center',        // 居中对齐
      itemWidth: 12,         // 缩小图例标记
      itemHeight: 12,
      textStyle: {
        fontSize: 11,        // 缩小字体
        width: 120,          // 限制文字宽度
        overflow: 'truncate' // 超长文字截断
      },
      pageShow: true,        // 图例过多时显示分页
      pageSize: 10           // 每页显示10个图例
    },
    series: [
      {
        name: '药材类别',
        type: 'pie',
        radius: ['50%', '80%'],  // 调整环形比例，避免扇区过窄
        center: ['50%', '40%'],  // 图表居中
        itemStyle: {
          borderRadius: 4,       // 扇区边角圆润化
          borderColor: '#fff',   // 扇区间隔白线
          borderWidth: 1
        },
        label: {
          show: false,           // 隐藏扇区内部标签（避免拥挤）
        },
        emphasis: {
          label: {
            show: true,
            fontSize: 14,
            fontWeight: 'bold'
          }
        },
        data: processedData,
        color: colors  // 使用自定义颜色
      }
    ]
  });



    // 2. 高频中药TOP10柱状图
    const topHerbsChart = echarts.init(document.getElementById('topHerbsChart'));
    // 打印数据到控制台（前端调试）
    console.log("高频中药名称：", {{ top_herbs_names|tojson }});
    console.log("高频中药数量：", {{ top_herbs_counts|tojson }});
    topHerbsChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'value', boundaryGap: [0, 0.01] },
        yAxis: { type: 'category', data: {{ top_herbs_names|tojson }} },
        series: [{
            name: '关联处方次数',
            type: 'bar',
            data: {{ top_herbs_counts|tojson }},
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                    { offset: 0, color: '#5470C6' },
                    { offset: 1, color: '#EE6666' }
                ])
            }
        }]
    });

    // 窗口大小变化时刷新图表
    window.addEventListener('resize', function() {
        categoryChart.resize();
        topHerbsChart.resize();
    });
});
</script>
{% endblock %}
