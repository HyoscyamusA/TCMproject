{% extends "layout.html" %}

{% block content %}
<div class="container-fluid py-3">
    <div class="mb-4">
        <h2 style="color: #2c3e50; font-weight: bold;">📊 知识图谱数据大屏</h2>
        <p class="text-muted">全方位洞察中医图谱中的数据分布与高频知识点</p>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100" style="border-radius: 12px;">
                <div class="card-body">
                    <h5 class="text-primary fw-bold mb-3">🧩 知识图谱实体分布</h5>
                    <div id="pie-chart" style="width: 100%; height: 350px;"></div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100" style="border-radius: 12px;">
                <div class="card-body">
                    <h5 class="text-success fw-bold mb-3">🌿 方剂中最常用的 Top 10 中药</h5>
                    <div id="bar-chart" style="width: 100%; height: 350px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-12">
            <div class="card shadow-sm border-0" style="border-radius: 12px;">
                <div class="card-body">
                    <h5 class="text-danger fw-bold mb-3">🩺 经典方剂最常治疗的 Top 10 疾病</h5>
                    <div id="line-chart" style="width: 100%; height: 400px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 接收后端传来的数据
    const nodesPieData = {{ nodes_pie_data | tojson | safe }};
    const topHerbsData = {{ top_herbs | tojson | safe }};
    const topDiseasesData = {{ top_diseases | tojson | safe }};

    // 1. 渲染实体分布饼图
    const pieChart = echarts.init(document.getElementById('pie-chart'));
    pieChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { top: 'bottom' },
        series: [{
            name: '实体类型',
            type: 'pie',
            radius: ['40%', '70%'],
            avoidLabelOverlap: false,
            itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
            label: { show: false, position: 'center' },
            emphasis: { label: { show: true, fontSize: 20, fontWeight: 'bold' } },
            labelLine: { show: false },
            data: nodesPieData,
            color: ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#1abc9c']
        }]
    });

    // 2. 渲染 Top 10 中药柱状图
    const barChart = echarts.init(document.getElementById('bar-chart'));
    barChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
            type: 'category',
            data: topHerbsData.map(item => item.name),
            axisLabel: { interval: 0, rotate: 30 }
        },
        yAxis: { type: 'value', name: '出现频次' },
        series: [{
            data: topHerbsData.map(item => item.value),
            type: 'bar',
            barWidth: '40%',
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: '#83bff6' },
                    { offset: 0.5, color: '#188df0' },
                    { offset: 1, color: '#188df0' }
                ]),
                borderRadius: [4, 4, 0, 0]
            }
        }]
    });

    // 3. 渲染 Top 10 疾病条形图
    const lineChart = echarts.init(document.getElementById('line-chart'));
    lineChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'value', name: '相关方剂数' },
        yAxis: {
            type: 'category',
            data: topDiseasesData.map(item => item.name).reverse(), // 反转数组让排名第一的在最上面
        },
        series: [{
            data: topDiseasesData.map(item => item.value).reverse(),
            type: 'bar',
            label: { show: true, position: 'right' },
            itemStyle: {
                color: '#ff6b6b',
                borderRadius: [0, 4, 4, 0]
            }
        }]
    });

    // 窗口尺寸变化时自适应
    window.addEventListener('resize', function() {
        pieChart.resize();
        barChart.resize();
        lineChart.resize();
    });
});
</script>
{% endblock %}
