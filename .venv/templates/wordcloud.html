{% extends "layout.html" %}

{% block content %}
<div class="container-fluid py-3">
    <div style="text-align: center; margin-bottom: 20px;">
      <h2 style="color: #2c3e50; font-weight: bold;">☁️ 中医知识图谱 - 多维词云分析</h2>
      <p style="color: #666; font-size: 15px;">点击下方按钮，从不同维度探索中医图谱的核心高频词汇</p>
    </div>

    <div class="text-center mb-4">
        <div class="btn-group shadow-sm" role="group" id="cloud-buttons">
            <button type="button" class="btn btn-primary active" onclick="loadWordCloud('efficacy', this)">✨ 中药功效</button>
            <button type="button" class="btn btn-outline-primary" onclick="loadWordCloud('herb', this)">🌿 高频中药</button>
            <button type="button" class="btn btn-outline-primary" onclick="loadWordCloud('symptom', this)">🤒 常见症状</button>
            <button type="button" class="btn btn-outline-primary" onclick="loadWordCloud('disease', this)">🩺 主治疾病</button>
        </div>
    </div>

    <div class="card shadow-sm border-0" style="border-radius: 12px;">
      <div class="card-body p-4">
          <div id="loading" class="text-center text-muted" style="display: none; padding: 100px 0;">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2">正在生成词云，请稍候...</p>
          </div>

          <div id="wordcloud" style="width: 100%; height: 500px;"></div>
      </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.0.0/dist/echarts-wordcloud.min.js"></script>

<script>
let wordcloudChart = null;

function loadWordCloud(type, btnElement) {
    // 切换按钮的激活状态样式
    if (btnElement) {
        document.querySelectorAll('#cloud-buttons .btn').forEach(btn => {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-primary');
            btn.classList.remove('active');
        });
        btnElement.classList.remove('btn-outline-primary');
        btnElement.classList.add('btn-primary');
        btnElement.classList.add('active');
    }

    const chartDom = document.getElementById('wordcloud');
    const loading = document.getElementById('loading');

    chartDom.style.display = 'none';
    loading.style.display = 'block';

    if (!wordcloudChart) {
        wordcloudChart = echarts.init(chartDom);
        window.addEventListener('resize', () => wordcloudChart.resize());
    }

    // 🌟 请求时带上 type 参数
    fetch(`/api/wordcloud_data?type=${type}`)
      .then(response => response.json())
      .then(data => {
          loading.style.display = 'none';
          chartDom.style.display = 'block';
          wordcloudChart.resize(); // 确保显示前尺寸正确

          if (data.length === 0) {
             wordcloudChart.clear();
             return;
          }

          const option = {
            tooltip: {
              show: true,
              formatter: function(item) {
                  return `<strong>${item.name}</strong> : 出现频次 ${item.value}`;
              }
            },
            series: [{
              type: 'wordCloud',
              gridSize: 15,
              sizeRange: [14, 70],
              rotationRange: [-45, 0, 45, 90], // 丰富文字角度
              shape: 'pentagon', // 可以是 'circle', 'cardioid', 'diamond', 'triangle-forward', 'triangle', 'pentagon', 'star'
              width: '90%',
              height: '90%',
              drawOutOfBound: false,
              textStyle: {
                color: function() {
                  // 生成更鲜艳的中医风格色彩
                  const colors = [
                      '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
                      '#9b59b6', '#1abc9c', '#e67e22', '#34495e', '#d35400'
                  ];
                  return colors[Math.floor(Math.random() * colors.length)];
                },
                emphasis: {
                  shadowBlur: 10,
                  shadowColor: '#333'
                }
              },
              data: data
            }]
          };

          // 绘制图表
          wordcloudChart.setOption(option);
      })
      .catch(err => {
          loading.style.display = 'none';
          console.error('获取词云数据失败:', err);
      });
}

// 页面加载完成后默认加载第一个（功效）
document.addEventListener('DOMContentLoaded', function() {
    loadWordCloud('efficacy', document.querySelector('#cloud-buttons .btn.active'));
});
</script>
{% endblock %}
