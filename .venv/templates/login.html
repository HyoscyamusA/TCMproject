<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 中医知识图谱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.95)),
                        url("https://images.unsplash.com/photo-1505576399279-565b52d4ac71");
            background-size: cover;
            background-attachment: fixed;
        }
        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-6px);
        }
        footer {
            padding: 30px;
            background: rgba(248, 249, 250, 0.9);
            text-align: center;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a href="/" class="navbar-brand text-success fw-bold text-decoration-none">中医知识图谱系统</a>
            <div>
                <a href="/login" class="btn btn-success">登录</a>
                <a href="/register" class="btn btn-outline-success">注册</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center my-5">
        <div class="card shadow p-4" style="width: 400px;">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h3 class="text-success fw-bold">系统登录</h3>
                    <p class="text-muted small">欢迎回到中医知识图谱系统</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} py-2 text-center" role="alert">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted">用户名</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">密码</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mb-3" style="border-radius: 8px;">立 即 登 录</button>
                </form>
                <div class="text-center">
                    <span class="text-muted small">还没有账号？ </span>
                    <a href="{{ url_for('register') }}" class="text-decoration-none text-success fw-bold">点击注册</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>中医药知识图谱问答系统 © 2026</p>
    </footer>

</body>
</html>
